<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>Akari — Feature Graphic 1024×500</title>
  <style>
    /* Render at exact Play Store feature-graphic dimensions. */
    html, body { margin: 0; padding: 0; }
    body {
      width: 1024px;
      height: 500px;
      overflow: hidden;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      color: #f3f4f6;
      /* Bluesky-flavoured indigo gradient with a cool accent glow on the right. */
      background:
        radial-gradient(900px 700px at 80% 50%, rgba(94, 177, 255, 0.35), transparent 65%),
        radial-gradient(600px 600px at 0% 100%, rgba(124, 140, 249, 0.2), transparent 60%),
        linear-gradient(135deg, #0b0d0f 0%, #15181c 50%, #1a2332 100%);
    }
    .frame {
      width: 1024px;
      height: 500px;
      display: flex;
      align-items: center;
      gap: 56px;
      padding: 0 80px;
      box-sizing: border-box;
    }
    .icon-wrap {
      flex-shrink: 0;
      width: 240px;
      height: 240px;
      border-radius: 56px;
      background: linear-gradient(140deg, #5eb1ff 0%, #7c8cf9 100%);
      padding: 18px;
      box-shadow:
        0 30px 60px -20px rgba(0, 133, 255, 0.6),
        0 10px 30px rgba(0, 0, 0, 0.4);
    }
    .icon {
      width: 100%;
      height: 100%;
      border-radius: 40px;
      object-fit: cover;
      display: block;
    }
    .copy { display: flex; flex-direction: column; gap: 16px; }
    h1 {
      margin: 0;
      font-size: 88px;
      letter-spacing: -0.04em;
      line-height: 1;
      font-weight: 700;
    }
    .accent { color: #5eb1ff; }
    .tagline {
      margin: 0;
      font-size: 26px;
      line-height: 1.3;
      font-weight: 500;
      color: #cbd5e1;
      max-width: 520px;
    }
    .subtle {
      margin: 8px 0 0;
      font-size: 16px;
      color: #94a3b8;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      font-weight: 600;
    }
  </style>
</head>
<body>
  <div class="frame">
    <div class="icon-wrap">
      <img class="icon" src="icon.png" alt="" />
    </div>
    <div class="copy">
      <h1>Akari<span class="accent">.</span></h1>
      <p class="tagline">A polished AT&nbsp;Protocol client for Bluesky and the open social network.</p>
      <p class="subtle">By Lucid Softworks</p>
    </div>
  </div>
</body>
</html>
