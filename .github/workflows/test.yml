name: test

on:
  pull_request:
    types: [opened, synchronize, labeled, reopened]
    paths-ignore:
      - '**/*.md'
      - '**/*.mdx'
      - 'docs/**'
      - '**/docs/**'

jobs:
  unit:
    name: unit
    permissions:
      contents: write
      pull-requests: write
      checks: write
    runs-on: blacksmith-4vcpu-ubuntu-2404
    # `pull_request` exposes no secrets to fork PRs and uses a read-only token,
    # so tests run on every PR. The coverage-comment step is guarded below
    # since posting a comment needs a writable token (same-repo PRs only).
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24.9.0
          cache: npm
      # Cache node_modules itself (not just the ~/.npm download cache) so a
      # lockfile-unchanged run skips the ~100s npm ci extract/link/postinstall.
      - name: Cache node_modules
        id: node-modules
        uses: useblacksmith/cache@v5
        with:
          path: |
            node_modules
            apps/*/node_modules
            packages/*/node_modules
          key: node-modules-${{ runner.os }}-node24-${{ hashFiles('package-lock.json') }}
      - if: steps.node-modules.outputs.cache-hit != 'true'
        run: npm ci
      - run: npm run test:coverage --workspaces --if-present
      - name: Merge coverage reports
        run: node ./scripts/merge-coverage.cjs
      - name: Report coverage
        # Fork PRs get a read-only GITHUB_TOKEN, so the comment can't be posted.
        if: github.event.pull_request.head.repo.full_name == github.repository
        uses: ./.github/actions/report-coverage
        with:
          github-token: ${{ github.token }}
          coverage-summary: coverage/coverage-summary.json
          coverage-json: coverage/coverage-final.json
          lcov-path: coverage/lcov.info
          artifact-name: coverage-report
          artifact-path: coverage
