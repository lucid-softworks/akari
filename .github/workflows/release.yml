name: release

on:
  release:
    types: [published]
  push:
    tags:
      - 'v*'
  workflow_call:
    inputs:
      release_tag:
        required: true
        type: string
  workflow_dispatch:
    inputs:
      release_tag:
        description: 'Release tag to deploy'
        required: true

jobs:
  prepare:
    name: Resolve release metadata
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      RELEASE_TAG: ${{ github.event_name == 'release' && github.event.release.tag_name || (startsWith(github.ref, 'refs/tags/') && github.ref_name) || github.event.inputs.release_tag || inputs.release_tag || '' }}
    outputs:
      release_tag: ${{ steps.resolve_tag.outputs.release_tag }}
      upload_url: ${{ steps.release_metadata.outputs.upload_url }}
      sha: ${{ steps.deploy_commit.outputs.sha }}
    steps:
      - name: Check for EXPO_TOKEN
        run: |
          if [ -z "${{ secrets.EXPO_TOKEN }}" ]; then
            echo "You must provide an EXPO_TOKEN secret linked to this project's Expo account in this repo's secrets."
            echo "Learn more: https://docs.expo.dev/eas-update/github-actions"
            exit 1
          fi

      - name: Expose release tag
        id: resolve_tag
        run: echo "release_tag=${RELEASE_TAG}" >> "$GITHUB_OUTPUT"

      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ env.RELEASE_TAG != '' && format('refs/tags/{0}', env.RELEASE_TAG) || github.sha }}

      - name: Resolve release metadata
        id: release_metadata
        env:
          EVENT_NAME: ${{ github.event_name }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPOSITORY: ${{ github.repository }}
        run: |
          set -euo pipefail

          if [ -z "$RELEASE_TAG" ]; then
            echo "RELEASE_TAG is not set for event $EVENT_NAME" >&2
            exit 1
          fi

          if [ "$EVENT_NAME" = "release" ]; then
            upload_url='${{ github.event.release.upload_url }}'
          else
            attempts=0
            while [ $attempts -lt 10 ]; do
              response=$(curl -fsSL \
                -H "Accept: application/vnd.github+json" \
                -H "Authorization: Bearer $GITHUB_TOKEN" \
                "https://api.github.com/repos/$REPOSITORY/releases/tags/$RELEASE_TAG" \
                || true)

              if [ -n "$response" ]; then
                upload_url=$(echo "$response" | jq -r '.upload_url // empty')
                if [ -n "$upload_url" ]; then
                  break
                fi
              fi

              attempts=$((attempts + 1))
              echo "Release metadata not available yet, retrying in 5 seconds... ($attempts/10)" >&2
              sleep 5
            done

            if [ -z "${upload_url:-}" ]; then
              echo "Failed to resolve release metadata for tag $RELEASE_TAG" >&2
              exit 1
            fi
          fi

          echo "upload_url=$upload_url" >> "$GITHUB_OUTPUT"

      - name: Determine deploy commit
        id: deploy_commit
        run: |
          tag_commit=$(git rev-parse "${RELEASE_TAG}^{commit}")
          head_commit=$(git rev-parse HEAD)
          if [ "$tag_commit" != "$head_commit" ]; then
            echo "Checked out commit $head_commit does not match release tag $RELEASE_TAG ($tag_commit)" >&2
            exit 1
          fi
          echo "sha=$tag_commit" >> "$GITHUB_OUTPUT"

  native-build:
    name: EAS Production Build (${{ matrix.label }})
    needs: prepare
    runs-on: ubuntu-latest
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: ios
            label: iOS
            ext: ipa
            content_type: application/octet-stream
          - platform: android
            label: Android
            ext: aab
            content_type: application/vnd.android.package-archive
    env:
      RELEASE_TAG: ${{ needs.prepare.outputs.release_tag }}
      EXPO_PUBLIC_COMMIT_SHA: ${{ needs.prepare.outputs.sha }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: refs/tags/${{ needs.prepare.outputs.release_tag }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24.9.0
          cache: npm

      - name: Setup EAS
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Install dependencies
        run: npm ci

      - name: Run production build
        working-directory: apps/akari
        run: |
          set -o pipefail
          eas build --profile production --platform ${{ matrix.platform }} --non-interactive --wait --json | tee "production-build-result-${{ matrix.platform }}.json"

      - name: Download native build artifact
        working-directory: apps/akari
        run: |
          set -euo pipefail
          mkdir -p release-artifacts
          artifact_path="release-artifacts/akari-${RELEASE_TAG}-${{ matrix.platform }}.${{ matrix.ext }}"
          build_url=$(jq -r '
            (if type == "array" then .[0] else . end)
            | .artifacts.applicationArchiveUrl // .artifacts.buildUrl // empty
          ' "production-build-result-${{ matrix.platform }}.json")
          if [ -z "$build_url" ] || [ "$build_url" = "null" ]; then
            echo "No build artifact URL in production-build-result-${{ matrix.platform }}.json" >&2
            cat "production-build-result-${{ matrix.platform }}.json" >&2
            exit 1
          fi
          curl -fSL --retry 3 --retry-delay 5 -o "$artifact_path" "$build_url"

      - name: Submit to store
        working-directory: apps/akari
        run: |
          eas submit --latest --platform ${{ matrix.platform }} --profile production --non-interactive --wait

      - name: Upload native artifact to GitHub Release
        if: needs.prepare.outputs.upload_url != ''
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ needs.prepare.outputs.upload_url }}
          asset_path: apps/akari/release-artifacts/akari-${{ needs.prepare.outputs.release_tag }}-${{ matrix.platform }}.${{ matrix.ext }}
          asset_name: akari-${{ needs.prepare.outputs.release_tag }}-${{ matrix.platform }}.${{ matrix.ext }}
          asset_content_type: ${{ matrix.content_type }}

      - name: Upload build manifest
        uses: actions/upload-artifact@v4
        with:
          name: eas-production-build-${{ matrix.platform }}
          path: apps/akari/production-build-result-${{ matrix.platform }}.json

      - name: Summarize build results
        run: |
          {
            echo "### EAS Production Build (${{ matrix.label }})"
            echo
            echo '```json'
            cat "apps/akari/production-build-result-${{ matrix.platform }}.json"
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"

  publish-update-and-web:
    name: EAS Update + Web Deploy
    needs: [prepare, native-build]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      RELEASE_TAG: ${{ needs.prepare.outputs.release_tag }}
      EXPO_PUBLIC_COMMIT_SHA: ${{ needs.prepare.outputs.sha }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: refs/tags/${{ needs.prepare.outputs.release_tag }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24.9.0
          cache: npm

      - name: Setup EAS
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Install dependencies
        run: npm ci

      - name: Publish EAS update for native apps
        working-directory: apps/akari
        env:
          APP_VARIANT: production
          EXPO_CLI_NO_PROMPT: 1
          EXPO_NO_TELEMETRY: 1
          EAS_NO_VCS: 1
        run: |
          set -euo pipefail
          eas update --branch production --platform all --message "Release ${RELEASE_TAG}" --non-interactive

      - name: Deploy production web bundle
        working-directory: apps/akari
        env:
          APP_VARIANT: production
          EXPO_CLI_NO_PROMPT: 1
          EXPO_NO_TELEMETRY: 1
        run: |
          set -euo pipefail
          npm run deploy:prod -- --non-interactive

      - name: Package web bundle for release
        working-directory: apps/akari
        run: |
          set -euo pipefail
          mkdir -p release-artifacts
          tar -czf "release-artifacts/akari-${RELEASE_TAG}-web.tar.gz" -C dist .

      - name: Upload web bundle to GitHub Release
        if: needs.prepare.outputs.upload_url != ''
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ needs.prepare.outputs.upload_url }}
          asset_path: apps/akari/release-artifacts/akari-${{ needs.prepare.outputs.release_tag }}-web.tar.gz
          asset_name: akari-${{ needs.prepare.outputs.release_tag }}-web.tar.gz
          asset_content_type: application/gzip
