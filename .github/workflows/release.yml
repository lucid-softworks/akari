name: release

on:
  push:
    tags:
      - 'v*'
  workflow_call:
    inputs:
      release_tag:
        required: true
        type: string
      release_sha:
        # Optional. Passed by `release-please.yml` because that flow opens
        # releases as drafts (per `release-please-config.json`) — the git
        # tag isn't created until `finalize-release` publishes the draft
        # at the end of this workflow. Without a SHA we can't check out
        # the release commit because the tag doesn't exist yet. For the
        # `push: tags` trigger and `workflow_dispatch` we don't need it
        # (the tag already exists by then).
        required: false
        type: string
        default: ''
  workflow_dispatch:
    inputs:
      release_tag:
        description: 'Release tag to deploy'
        required: true

jobs:
  prepare:
    name: Resolve release metadata
    runs-on: blacksmith-4vcpu-ubuntu-2404
    permissions:
      contents: read
    env:
      RELEASE_TAG: ${{ (startsWith(github.ref, 'refs/tags/') && github.ref_name) || github.event.inputs.release_tag || inputs.release_tag || '' }}
      RELEASE_SHA: ${{ inputs.release_sha || '' }}
    outputs:
      release_tag: ${{ steps.resolve_tag.outputs.release_tag }}
      checkout_ref: ${{ steps.resolve_tag.outputs.checkout_ref }}
      sha: ${{ steps.deploy_commit.outputs.sha }}
    steps:
      - name: Check for EXPO_TOKEN
        run: |
          if [ -z "${{ secrets.EXPO_TOKEN }}" ]; then
            echo "You must provide an EXPO_TOKEN secret linked to this project's Expo account in this repo's secrets."
            echo "Learn more: https://docs.expo.dev/eas-update/github-actions"
            exit 1
          fi

      - name: Expose release tag
        id: resolve_tag
        run: |
          if [ -z "$RELEASE_TAG" ]; then
            echo "RELEASE_TAG is not set for event ${{ github.event_name }}" >&2
            exit 1
          fi
          echo "release_tag=${RELEASE_TAG}" >> "$GITHUB_OUTPUT"
          # Prefer the SHA when release-please-action passed it (draft
          # release — tag not yet created); fall back to the tag ref for
          # the push-tag trigger and workflow_dispatch where the tag is
          # already published.
          if [ -n "$RELEASE_SHA" ]; then
            echo "checkout_ref=${RELEASE_SHA}" >> "$GITHUB_OUTPUT"
          else
            echo "checkout_ref=refs/tags/${RELEASE_TAG}" >> "$GITHUB_OUTPUT"
          fi

      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ steps.resolve_tag.outputs.checkout_ref }}

      - name: Determine deploy commit
        id: deploy_commit
        run: |
          head_commit=$(git rev-parse HEAD)
          # When we checked out by tag, verify the tag points at the
          # checked-out commit. When we checked out by SHA (draft-mode
          # path from release-please), the tag doesn't exist yet — skip
          # the cross-check and trust the SHA we were handed.
          if [ -z "$RELEASE_SHA" ]; then
            tag_commit=$(git rev-parse "${RELEASE_TAG}^{commit}")
            if [ "$tag_commit" != "$head_commit" ]; then
              echo "Checked out commit $head_commit does not match release tag $RELEASE_TAG ($tag_commit)" >&2
              exit 1
            fi
          fi
          echo "sha=${head_commit}" >> "$GITHUB_OUTPUT"

  native-build:
    name: EAS Production Build (${{ matrix.label }})
    needs: prepare
    runs-on: blacksmith-4vcpu-ubuntu-2404
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: ios
            label: iOS
            ext: ipa
            submit_continue_on_error: false
          - platform: android
            label: Android
            ext: aab
            # Android Play submit needs a Google service account JSON registered
            # on EAS (`eas credentials -p android` to upload). Until that's set
            # up, let the step fail without blocking the rest of the release.
            submit_continue_on_error: true
    env:
      RELEASE_TAG: ${{ needs.prepare.outputs.release_tag }}
      EXPO_PUBLIC_COMMIT_SHA: ${{ needs.prepare.outputs.sha }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ needs.prepare.outputs.checkout_ref }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24.9.0
          cache: npm

      - name: Setup EAS
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Install dependencies
        run: npm ci

      - name: Run production build
        working-directory: apps/akari
        run: |
          set -o pipefail
          eas build --profile production --platform ${{ matrix.platform }} --non-interactive --wait --json | tee "production-build-result-${{ matrix.platform }}.json"

      - name: Download native build artifact
        working-directory: apps/akari
        run: |
          set -euo pipefail
          mkdir -p release-artifacts
          artifact_path="release-artifacts/akari-${RELEASE_TAG}-${{ matrix.platform }}.${{ matrix.ext }}"
          build_url=$(jq -r '
            (if type == "array" then .[0] else . end)
            | .artifacts.applicationArchiveUrl // .artifacts.buildUrl // empty
          ' "production-build-result-${{ matrix.platform }}.json")
          if [ -z "$build_url" ] || [ "$build_url" = "null" ]; then
            echo "No build artifact URL in production-build-result-${{ matrix.platform }}.json" >&2
            cat "production-build-result-${{ matrix.platform }}.json" >&2
            exit 1
          fi
          curl -fSL --retry 3 --retry-delay 5 -o "$artifact_path" "$build_url"

      - name: Submit to store
        working-directory: apps/akari
        continue-on-error: ${{ matrix.submit_continue_on_error }}
        run: |
          eas submit --latest --platform ${{ matrix.platform }} --profile production --non-interactive --wait

      - name: Upload native artifact to GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          gh release upload "$RELEASE_TAG" \
            "apps/akari/release-artifacts/akari-${RELEASE_TAG}-${{ matrix.platform }}.${{ matrix.ext }}" \
            --clobber

      - name: Upload build manifest
        uses: actions/upload-artifact@v4
        with:
          name: eas-production-build-${{ matrix.platform }}
          path: apps/akari/production-build-result-${{ matrix.platform }}.json

      - name: Summarize build results
        run: |
          {
            echo "### EAS Production Build (${{ matrix.label }})"
            echo
            echo '```json'
            cat "apps/akari/production-build-result-${{ matrix.platform }}.json"
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"

  publish-update-and-web:
    name: EAS Update + Web Deploy
    needs: [prepare, native-build]
    runs-on: blacksmith-4vcpu-ubuntu-2404
    permissions:
      contents: write
    env:
      RELEASE_TAG: ${{ needs.prepare.outputs.release_tag }}
      EXPO_PUBLIC_COMMIT_SHA: ${{ needs.prepare.outputs.sha }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ needs.prepare.outputs.checkout_ref }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24.9.0
          cache: npm

      - name: Setup EAS
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Install dependencies
        run: npm ci

      - name: Publish EAS update for native apps
        working-directory: apps/akari
        env:
          APP_VARIANT: production
          EXPO_CLI_NO_PROMPT: 1
          EXPO_NO_TELEMETRY: 1
          EAS_NO_VCS: 1
        run: |
          set -euo pipefail
          eas update --branch production --platform all --message "Release ${RELEASE_TAG}" --non-interactive

      - name: Deploy production web bundle
        working-directory: apps/akari
        env:
          APP_VARIANT: production
          EXPO_CLI_NO_PROMPT: 1
          EXPO_NO_TELEMETRY: 1
        run: |
          set -euo pipefail
          npm run deploy:prod -- --non-interactive

      - name: Package web bundle for release
        working-directory: apps/akari
        run: |
          set -euo pipefail
          mkdir -p release-artifacts
          tar -czf "release-artifacts/akari-${RELEASE_TAG}-web.tar.gz" -C dist .

      - name: Upload web bundle to GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          gh release upload "$RELEASE_TAG" \
            "apps/akari/release-artifacts/akari-${RELEASE_TAG}-web.tar.gz" \
            --clobber

  finalize-release:
    name: Publish GitHub Release
    needs: [prepare, native-build, publish-update-and-web]
    runs-on: blacksmith-4vcpu-ubuntu-2404
    permissions:
      contents: write
    env:
      RELEASE_TAG: ${{ needs.prepare.outputs.release_tag }}
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - name: Publish draft release
        run: |
          set -euo pipefail
          gh release edit "$RELEASE_TAG" --repo "${{ github.repository }}" --draft=false --latest
